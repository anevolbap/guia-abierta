[project]
name = "guiat"
version = "0.1.0"
description = "Open-source printable A5 Guía T booklet for Buenos Aires, generated from open data."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "geopandas>=0.14",
    "shapely>=2.0",
    "pyproj>=3.6",
    "fiona>=1.9",
    "gtfs_kit>=6.0",
    "osmnx>=1.9",
    "matplotlib>=3.8",
    "weasyprint>=61",
    "pypdf>=4.0",
    "requests>=2.31",
    "pyyaml>=6.0",
    "pandas>=2.1",
    "numpy>=1.26",
]

[tool.uv]
# weasyprint needs system libs (pango, cairo, gdk-pixbuf). See README.

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
# pyflakes (F), pycodestyle (E/W), isort (I), pyupgrade (UP), bugbear (B).
select = ["E", "F", "W", "I", "UP", "B"]
# E741 ambiguous names, E731 assigned-lambda (used in fetch.py / main.py),
# E501 line-too-long (no autoformatter here, length is left to judgment).
ignore = ["E741", "E731", "E501"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# Flat module layout (modules live at repo root, per the build spec).
include = [
    "config.py", "fetch.py", "grid.py", "street_index.py", "landmarks.py",
    "names.py", "transit_index.py", "render_pages.py", "frontmatter.py",
    "assemble.py", "impose.py", "fonts.py", "mpl_style.py", "main.py",
    "assets/fonts/*",
]
